name: topic_extraction
description: Topic extraction prompt
metadata:
  display_name: Topic Extraction
  category: text_analyzer
  step_name: topic_extraction
  variable_definitions:
    text:
      type: str
      description: Input text to extract topics from
    sentiment:
      type: enum
      description: Previously detected sentiment
      auto_generate: enum_names(Sentiment)
messages:
  - role: system
    content: >-
      You are a topic extraction specialist. Identify the key topics discussed
      in the provided text. For each topic, assign a relevance score between 0
      and 1. Determine the single primary topic. Consider the sentiment context
      when evaluating topic importance.
  - role: user
    content: |
      Extract topics from the following text. The text has been analyzed as having a {sentiment} sentiment.

      Text:
      {text}
